name: Daily policy data update

on:
  schedule:
    # 06:20 China time
    - cron: "20 22 * * *"
  workflow_dispatch:
    inputs:
      days:
        description: "Recent days to scan"
        required: false
        default: "45"
      pages:
        description: "Pages per keyword"
        required: false
        default: "3"
      all_keywords:
        description: "Scan every seed keyword, slower but broader"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: daily-policy-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: python -m pip install --upgrade requests beautifulsoup4 lxml
      - name: Update static data
        env:
          DAYS: ${{ github.event.inputs.days || '45' }}
          PAGES: ${{ github.event.inputs.pages || '3' }}
          ALL_KEYWORDS: ${{ github.event.inputs.all_keywords || 'false' }}
        run: |
          args=(--days "$DAYS" --pages "$PAGES")
          if [[ "$ALL_KEYWORDS" == "true" ]]; then
            args+=(--all-keywords)
          fi
          python update_static_data.py "${args[@]}"
      - name: Verify generated data
        run: python verify_data_quality.py
      - name: Commit updated data
        run: |
          if [[ -n "$(git status --porcelain site/data)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add site/data
            git commit -m "Auto data update $(date -u +%F)"
            git push origin main
          else
            echo "No data changes."
          fi
